<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Typing Speed Test - PlayVerse</title>

<meta name="description" content="Test your typing speed, accuracy and words per minute online.">

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>
⌨️ Typing Speed Test
</h1>


<a href="../index.html">
⬅ Back to PlayVerse
</a>


</header>



<section class="container">


<div class="stats">


<div>
Time
<br>
<span id="time">
60
</span>
</div>



<div>
WPM
<br>
<span id="wpm">
0
</span>
</div>



<div>
Accuracy
<br>
<span id="accuracy">
100%
</span>
</div>



</div>





<div id="textDisplay">

Click Start and begin typing...

</div>




<textarea 
id="typingArea"
placeholder="Start typing here..."
disabled>
</textarea>




<div class="buttons">


<button id="startBtn">
Start Test
</button>


<button id="resetBtn">
Reset
</button>


</div>




<div id="result">

</div>


</section>




<script src="script.js"></script>


</body>

</html>
